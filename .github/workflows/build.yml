name: Build RoadSoS APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK (manual — more reliable than setup-android@v3) ──────
      - name: Set up Android SDK
        run: |
          # Install command-line tools
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -o /tmp/cmdtools.zip "$CMDLINE_TOOLS_URL"
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1

          # Install required SDK components
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

          # Persist env vars for subsequent steps
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # ── Gradle cache ─────────────────────────────────────────────────────
      - name: Cache Gradle
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Permissions ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── Debug APK ────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        env:
          # Override runner-injected JVM options that cause "-Xmx64m -Xms64m" class error
          JAVA_TOOL_OPTIONS: "-Xmx1536m"
          _JAVA_OPTIONS: "-Xmx1536m"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m"
        run: |
          printf 'org.gradle.jvmargs=-Xmx1536m\nandroid.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.daemon=false\n' > gradle.properties
          cat gradle.properties
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: roadsos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Copy APK to static/downloads ─────────────────────────────────────
      - name: Copy APK to static/downloads
        run: |
          mkdir -p static/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             static/downloads/roadsos-debug.apk

      - name: Commit APK to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/downloads/roadsos-debug.apk
          git diff --staged --quiet || \
            git commit -m "ci: update debug APK [skip ci]" && git push

      # ── Release APK (version tags only) ──────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > android/roadsos-release.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/android/roadsos-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: roadsos-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          name: RoadSoS ${{ github.ref_name }}
          body: |
            ## RoadSoS ${{ github.ref_name }}

            ### Install on Android (sideload)
            1. Download `app-release.apk`
            2. Settings → Apps → Special access → Install unknown apps → allow
            3. Open the APK and tap Install